<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#E8B84B" />
    <meta name="description" content="Janz Burgers — Pedí, disfrutá y repetí." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Janz Burgers" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta property="og:title" content="Janz Burgers" />
    <meta property="og:description" content="Pedí, disfrutá y repetí." />
    <meta property="og:image" content="/favicon-logo.png" />
    <title>Janz Burgers</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon-logo.png" />
    <link rel="apple-touch-startup-image" href="/favicon-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <style>
      /* Splash screen mientras carga */
      #splash {
        position: fixed; inset: 0;
        background: #080810;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 80px; height: 80px;
        border-radius: 20px;
        margin-bottom: 20px;
      }
      #splash-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.2rem;
        color: #E8B84B;
        letter-spacing: 0.05em;
      }
      #splash-sub {
        font-family: sans-serif;
        font-size: 0.85rem;
        color: #6b6b8a;
        margin-top: 6px;
      }
      #splash-spinner {
        width: 28px; height: 28px;
        border: 2.5px solid rgba(255,255,255,0.1);
        border-top-color: #E8B84B;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-top: 32px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
    </style>
  </head>
  <body>
    <noscript>Necesitás JavaScript para usar este sistema.</noscript>

    <!-- Splash screen -->
    <div id="splash">
      <img id="splash-logo" src="/favicon-logo.png" alt="Janz" />
      <div id="splash-title">JANZ BURGERS</div>
      <div id="splash-sub">Pedí, disfrutá y repetí.</div>
      <div id="splash-spinner"></div>
    </div>

    <div id="root"></div>

    <script>
      // Registrar Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }

      // Ocultar splash cuando React cargue
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 400);
          }
        }, 800);
      });
    </script>
  </body>
</html>
